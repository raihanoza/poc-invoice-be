# One-Droplet stack: Postgres + NestJS backend + n8n.
# Frontend (Next.js) stays on Vercel — it only needs NEXT_PUBLIC_API_BASE_URL
# pointing at this backend.
#
# Usage on the server:
#   cp .env.deploy.example .env   # then fill in the secrets
#   docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      # 'postgres' is the service name above — reachable on the compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BUSINESS_NAME: ${BUSINESS_NAME}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      WHATSAPP_SERVICE_URL: ${WHATSAPP_SERVICE_URL}
      WHATSAPP_SERVICE_IMAGE_URL: ${WHATSAPP_SERVICE_IMAGE_URL}
      WHATSAPP_SERVICE_TOKEN: ${WHATSAPP_SERVICE_TOKEN}
      WHATSAPP_SESSION_ID: ${WHATSAPP_SESSION_ID}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      REMINDER_DAYS_BEFORE_DUE: ${REMINDER_DAYS_BEFORE_DUE}
    # No host port published: traffic comes in through Caddy (HTTPS) only.
    # Caddy reaches it as http://backend:3001 on the compose network.
    expose:
      - "3001"
    # Lets the container reach a WhatsApp gateway running on the host via
    # http://host.docker.internal:3002 (Linux needs the host-gateway mapping).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data     # stores the Let's Encrypt cert — must persist
      - caddy_config:/config

  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      GENERIC_TIMEZONE: Asia/Jakarta
      TZ: Asia/Jakarta
      # Accessing n8n over plain http by IP: the login cookie won't be set with
      # the secure flag on, so logging in would silently fail. Turn it off.
      N8N_SECURE_COOKIE: "false"
      # The workflow reads vars via {{ $env.* }} inside Code nodes — allow it.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Keep this stable so saved credentials survive restarts/redeploys.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      # --- variables the imported workflow reads ({{ $env.* }}) ---
      # n8n reaches the backend by service name on the compose network:
      API_BASE_URL: http://backend:3001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      WHATSAPP_SERVICE_URL: ${WHATSAPP_SERVICE_URL}
      WHATSAPP_SERVICE_IMAGE_URL: ${WHATSAPP_SERVICE_IMAGE_URL}
      WHATSAPP_SERVICE_TOKEN: ${WHATSAPP_SERVICE_TOKEN}
      WHATSAPP_SESSION_ID: ${WHATSAPP_SESSION_ID}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    # Same as backend: reach a host-side WhatsApp gateway via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  n8n_data:
  caddy_data:
  caddy_config:
